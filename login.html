<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FlixoraPlay</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 32px) 16px 48px;
    }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-logo-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: var(--purple-dim);
      border: 1px solid rgba(139,92,246,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      color: var(--purple-light);
    }
    .auth-logo-icon svg { width: 26px; height: 26px; }
  </style>
</head>
<body>

<nav>
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Flixora<span>Play</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">
        <svg data-lucide="home"></svg> Home
      </a>
      <a href="browse.html" class="nav-link">
        <svg data-lucide="compass"></svg> Browse
      </a>
      <a href="leaderboard.html" class="nav-link">
        <svg data-lucide="bar-chart-2"></svg> Leaderboard
      </a>
      <a href="about.html" class="nav-link">
        <svg data-lucide="info"></svg> About
      </a>
    </div>
    <div class="nav-actions">
      <a href="create-competition.html" class="btn btn-outline btn-sm">
        <svg data-lucide="plus-circle"></svg> Host
      </a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:28px;">
      <div class="auth-logo-icon">
        <svg data-lucide="film"></svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:800;color:#fff;letter-spacing:-0.03em;margin-bottom:6px;">Welcome back</h1>
      <p class="text-muted" style="font-size:0.875rem;">Sign in to your FlixoraPlay account.</p>
    </div>

    <div class="card">
      <div class="card-body" style="padding:28px;">
        <div class="form-group">
          <label for="l-email">
            <svg data-lucide="mail" style="width:13px;height:13px;display:inline;vertical-align:middle;margin-right:4px;"></svg>
            Email <span class="req">*</span>
          </label>
          <input type="email" id="l-email" placeholder="you@example.com" />
        </div>
        <div class="form-group" style="margin-bottom:24px;">
          <label for="l-password">
            <svg data-lucide="lock" style="width:13px;height:13px;display:inline;vertical-align:middle;margin-right:4px;"></svg>
            Password <span class="req">*</span>
          </label>
          <input type="password" id="l-password" placeholder="Enter your password" />
        </div>

        <button class="btn btn-primary w-full" onclick="handleLogin()" style="justify-content:center;">
          <svg data-lucide="log-in"></svg> Sign In
        </button>

        <div class="divider" style="margin:22px 0;"></div>

        <p style="text-align:center;font-size:0.875rem;color:var(--text-3);">
          Don't have an account?
          <a href="register.html" style="color:var(--purple-light);font-weight:600;">Create one free</a>
        </p>
      </div>
    </div>

    <div class="alert alert-info" style="margin-top:16px;">
      <svg data-lucide="info"></svg>
      <div><strong>Note:</strong> In this demo, any password works for an existing email.</div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="js/app.js"></script>
<script>
  lucide.createIcons();

  async function handleLogin() {
    const email    = document.getElementById('l-email').value.trim();
    const password = document.getElementById('l-password').value.trim();
    if (!email || !password) { showToast('Please enter email and password.', 'error'); return; }
    if (!email.includes('@')) { showToast('Please enter a valid email.', 'error'); return; }

    try {
      const user = await API.login(email, password);
      setSession(user);
      showToast('Welcome back, ' + user.username, 'success');
      setTimeout(() => navigate('browse.html'), 1000);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
