<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Competitions — FlixoraPlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Flixora<span>Play</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link"><svg data-lucide="home"></svg> Home</a>
        <a href="browse.html" class="nav-link active"><svg data-lucide="compass"></svg> Browse</a>
        <a href="leaderboard.html" class="nav-link"><svg data-lucide="bar-chart-2"></svg> Leaderboard</a>
        <a href="about.html" class="nav-link"><svg data-lucide="info"></svg> About</a>
      </div>
      <div class="nav-actions">
        <a href="create-competition.html" class="btn btn-outline btn-sm"><svg data-lucide="plus-circle"></svg> Host</a>
        <a href="login.html" class="btn btn-primary btn-sm"><svg data-lucide="log-in"></svg> Sign In</a>
      </div>
    </div>
  </nav>

  <div class="page-header page-top">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> Browse</div>
      <h1>Browse Competitions</h1>
      <p>Discover AI filmmaking competitions, join challenge events, or follow the judging process.</p>
    </div>
  </div>

  <div class="page-body" style="padding-top: 0;">
    <div class="container">

      <!-- Category Selector Pills -->
      <div class="category-pills" id="category-pills">
        <button class="category-pill active" data-category="all">All Themes</button>
        <button class="category-pill" data-category="Sci-Fi">Sci-Fi</button>
        <button class="category-pill" data-category="Horror">Horror</button>
        <button class="category-pill" data-category="Fantasy">Fantasy</button>
        <button class="category-pill" data-category="Cyberpunk">Cyberpunk</button>
        <button class="category-pill" data-category="Drama">Drama</button>
        <button class="category-pill" data-category="Comedy">Comedy</button>
        <button class="category-pill" data-category="Animation">Animation</button>
      </div>

      <!-- Filters & Search Toolbar -->
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap;">
        <div class="search-wrapper">
          <svg data-lucide="search" class="search-icon-inside"></svg>
          <input type="text" id="search-input" placeholder="Search title, description, or host..." />
        </div>
        <select id="sort-select" style="max-width:180px;">
          <option value="newest">Newest First</option>
          <option value="deadline">Deadline Soon</option>
          <option value="prize">Highest Prize</option>
        </select>
        <span id="result-count" class="text-muted text-small" style="margin-left:auto;">0 competitions</span>
      </div>

      <!-- Status Sub-tabs -->
      <div class="tabs" id="status-tabs" style="margin-bottom: 24px;">
        <button class="tab-btn active" data-tab="all"><svg data-lucide="layout-grid"></svg> All Statuses</button>
        <button class="tab-btn" data-tab="open"><svg data-lucide="circle-dot"></svg> Open</button>
        <button class="tab-btn" data-tab="judging"><svg data-lucide="scale"></svg> Judging</button>
        <button class="tab-btn" data-tab="closed"><svg data-lucide="lock"></svg> Closed</button>
      </div>

      <!-- Competitions Grid -->
      <div class="grid-auto" id="comp-grid">
        <!-- Loader Skeleton Slices -->
        <div class="comp-card skeleton-card">
          <div class="comp-card-thumb skeleton skeleton-thumb"></div>
          <div class="comp-card-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width:80%;"></div>
          </div>
        </div>
        <div class="comp-card skeleton-card">
          <div class="comp-card-thumb skeleton skeleton-thumb"></div>
          <div class="comp-card-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width:80%;"></div>
          </div>
        </div>
        <div class="comp-card skeleton-card">
          <div class="comp-card-thumb skeleton skeleton-thumb"></div>
          <div class="comp-card-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width:80%;"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
      <div>
        <div style="font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-0.03em;margin-bottom:4px;">Flixora<span>Play</span></div>
        <p style="font-size:0.78rem;color:var(--text-4);">AI Film Festival Platform</p>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:0.82rem;">
        <a href="browse.html">Browse</a>
        <a href="create-competition.html">Host</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </footer>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    let activeCategory = 'all';
    let activeStatus = 'all';
    let searchDebounceTimeout = null;
    let allEntries = [];

    document.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons();

      // Parse query parameters
      const urlCat = getParam('category');
      if (urlCat) {
        activeCategory = urlCat;
        document.querySelectorAll('.category-pill').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.category.toLowerCase() === urlCat.toLowerCase());
        });
      }

      const urlSearch = getParam('search');
      if (urlSearch) {
        document.getElementById('search-input').value = urlSearch;
      }

      // Pre-load entries to count submission stats on cards
      try {
        allEntries = await API.getEntries();
      } catch (err) {
        console.warn('Failed to load entries statistics', err);
      }

      // Wire Category Pills
      document.getElementById('category-pills').addEventListener('click', (e) => {
        const pill = e.target.closest('.category-pill');
        if (!pill) return;
        document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
        pill.classList.add('active');
        activeCategory = pill.dataset.category;
        loadCompetitions();
      });

      // Wire Status Tabs
      document.getElementById('status-tabs').addEventListener('click', (e) => {
        const tab = e.target.closest('.tab-btn');
        if (!tab) return;
        document.querySelectorAll('#status-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
        tab.classList.add('active');
        activeStatus = tab.dataset.tab;
        loadCompetitions();
      });

      // Wire Search & Sort
      document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(searchDebounceTimeout);
        searchDebounceTimeout = setTimeout(loadCompetitions, 300);
      });
      document.getElementById('sort-select').addEventListener('change', loadCompetitions);

      // Initial Fetch
      loadCompetitions();
    });

    function showSkeletons() {
      const grid = document.getElementById('comp-grid');
      grid.innerHTML = Array(3).fill(0).map(() => `
        <div class="comp-card">
          <div class="comp-card-thumb skeleton skeleton-thumb"></div>
          <div class="comp-card-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width:90%;"></div>
            <div class="skeleton skeleton-text" style="width:70%;"></div>
          </div>
        </div>
      `).join('');
    }

    async function loadCompetitions() {
      showSkeletons();

      const searchVal = document.getElementById('search-input').value.trim();
      const sortVal = document.getElementById('sort-select').value;

      try {
        let comps = await API.getCompetitions({
          search: searchVal || null,
          category: activeCategory || null,
          sort: sortVal || null,
          is_brand_brief: 0
        });

        // Filter status client-side since API returns full list
        if (activeStatus !== 'all') {
          comps = comps.filter(c => c.status === activeStatus);
        }

        renderCompetitions(comps);
      } catch (err) {
        document.getElementById('comp-grid').innerHTML = `
          <div class="empty-state">
            <div class="icon"><svg data-lucide="wifi-off"></svg></div>
            <h3>Could not connect</h3>
            <p>${err.message}</p>
            <button class="btn btn-outline btn-sm" onclick="loadCompetitions()" style="margin-top:10px;"><svg data-lucide="refresh-cw"></svg> Retry</button>
          </div>`;
        lucide.createIcons();
      }
    }

    function renderCompetitions(comps) {
      document.getElementById('result-count').textContent = `${comps.length} competition${comps.length !== 1 ? 's' : ''}`;
      const grid = document.getElementById('comp-grid');

      if (comps.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1; padding: 60px 20px;">
            <div class="icon"><svg data-lucide="inbox"></svg></div>
            <h3>No matches found</h3>
            <p>We couldn't find any competitions matching your selected filters. Try broadening your query.</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      grid.innerHTML = comps.map(comp => {
        const days = daysRemaining(comp.deadline);
        const pct = deadlinePercent(comp.createdAt, comp.deadline);
        const statusBadge = {
          open: `<span class="badge badge-green"><svg data-lucide="circle-dot" style="width:9px;height:9px;"></svg> Open</span>`,
          judging: `<span class="badge badge-gold"><svg data-lucide="scale" style="width:9px;height:9px;"></svg> Judging</span>`,
          closed: `<span class="badge badge-neutral"><svg data-lucide="lock" style="width:9px;height:9px;"></svg> Closed</span>`,
        }[comp.status] || '';

        const entriesCount = allEntries.filter(e => e.competitionId === comp.id).length;

        return `
          <div class="comp-card">
            <div class="comp-card-thumb">
              <svg data-lucide="film" style="width:52px;height:52px;"></svg>
            </div>
            <div class="comp-card-body">
              <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;">
                ${statusBadge}
                ${comp.prize ? `<span class="badge badge-gold"><svg data-lucide="dollar-sign" style="width:9px;height:9px;"></svg> ${comp.prize}</span>` : ''}
                ${comp.maxDuration ? `<span class="badge badge-blue"><svg data-lucide="clock" style="width:9px;height:9px;"></svg> ${comp.maxDuration}s</span>` : ''}
              </div>
              <div class="comp-card-title">${comp.title}</div>
              <div class="comp-card-desc">${comp.description || 'No description provided.'}</div>
              <div style="font-size:0.75rem;color:var(--text-3);margin-bottom:12px;display:flex;align-items:center;gap:5px;">
                <span class="badge badge-neutral"><svg data-lucide="target" style="width:9px;height:9px;"></svg> ${comp.theme || 'Open Topic'}</span>
              </div>
              ${comp.status === 'open' ? `
              <div class="deadline-wrap">
                <div class="deadline-bar"><div class="deadline-fill" style="width:${pct}%"></div></div>
                <div class="deadline-label"><svg data-lucide="calendar"></svg> ${days > 0 ? days + ' days left' : 'Deadline passed'} &middot; ${formatDate(comp.deadline)}</div>
              </div>` : ''}
            </div>
            <div class="comp-card-footer">
              <span style="display:flex;align-items:center;gap:5px;color:var(--text-3);font-size:0.78rem;">
                <svg data-lucide="user" style="width:11px;height:11px;"></svg>${comp.hostName || 'Anonymous'} &middot; ${entriesCount} entry${entriesCount !== 1 ? 's' : ''}
              </span>
              <a href="competition.html?id=${comp.id}" class="btn btn-sm btn-outline"><svg data-lucide="arrow-right"></svg> Open</a>
            </div>
          </div>`;
      }).join('');

      lucide.createIcons();
    }
  </script>
</body>
</html>
