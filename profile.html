<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Profile — FlixoraPlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* ── Profile Page Layout ────────────────────── */
    .profile-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* ── The Creator Card ───────────────────────── */
    .creator-card {
      position: sticky;
      top: calc(var(--nav-h) + 24px);
      background: var(--bg-2);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
    }

    .cc-banner {
      height: 80px;
      background: var(--bg-3);
      border-bottom: 1px solid var(--glass-border);
      position: relative;
    }

    .cc-body {
      padding: 0 28px 28px;
      text-align: center;
    }

    .cc-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 3px solid var(--bg-2);
      background: var(--bg-3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: var(--text-2);
      margin: -44px auto 0;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cc-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .cc-name {
      font-size: 1.25rem; font-weight: 800; color: #fff;
      letter-spacing: -0.02em;
      margin-top: 14px;
    }

    .cc-role {
      font-size: 0.72rem; font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .cc-tier {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 14px; border-radius: 9999px;
      font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: var(--bg-3); color: var(--text-2);
      border: 1px solid var(--glass-border);
      margin-top: 10px;
    }
    .cc-tier svg { width: 11px; height: 11px; }
    .cc-tier.tier-bronze { color: #d4a574; }
    .cc-tier.tier-silver { color: #cbd5e1; }
    .cc-tier.tier-gold   { color: var(--gold-light); }
    .cc-tier.tier-platinum { color: var(--purple-light); }

    .cc-bio {
      font-size: 0.82rem; color: var(--text-3);
      line-height: 1.55;
      margin-top: 16px;
      text-align: left;
    }

    .cc-divider {
      border: none;
      border-top: 1px solid var(--glass-border);
      margin: 20px 0;
    }

    .cc-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .cc-stat {
      padding: 12px 0;
      text-align: center;
    }
    .cc-stat-num {
      font-size: 1.2rem; font-weight: 800; color: #fff;
      line-height: 1;
    }
    .cc-stat-lbl {
      font-size: 0.62rem; font-weight: 600;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }

    .cc-meta {
      margin-top: 4px;
    }

    .cc-meta-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0;
      font-size: 0.78rem; color: var(--text-3);
    }
    .cc-meta-row svg { width: 13px; height: 13px; color: var(--text-4); flex-shrink: 0; }

    .cc-footer {
      padding: 16px 28px;
      border-top: 1px solid var(--glass-border);
      display: flex; gap: 8px;
    }
    .cc-footer .btn { flex: 1; justify-content: center; }

    .cc-badge-row {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    /* ── Right Panel ────────────────────────────── */
    .profile-right-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .profile-right-header h2 {
      font-size: 1.15rem; font-weight: 700; color: #fff;
    }

    /* History list */
    .history-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--glass-border);
      transition: background var(--t);
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--glass); }
    .history-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: var(--bg-3); border: 1px solid var(--glass-border);
      color: var(--text-4);
    }
    .history-icon svg { width: 16px; height: 16px; }
    .history-icon.won { color: var(--gold-light); }
    .history-icon.silver { color: #cbd5e1; }
    .history-icon.bronze { color: #fbbf24; }
    .history-info { flex: 1; min-width: 0; }
    .history-title {
      font-weight: 600; font-size: 0.88rem; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .history-detail { font-size: 0.75rem; color: var(--text-3); margin-top: 2px; }
    .history-score { text-align: right; flex-shrink: 0; }
    .history-score .num { font-size: 1.1rem; font-weight: 800; color: #fff; }
    .history-score .lbl { font-size: 0.62rem; color: var(--text-4); }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 860px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }
      .creator-card {
        position: static;
        max-width: 420px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Flixora<span style="color:var(--text-3);">Play</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="browse.html" class="nav-link">Browse</a>
        <a href="leaderboard.html" class="nav-link">Leaderboard</a>
      </div>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost btn-sm">Sign In</a>
        <a href="create-competition.html" class="btn btn-primary btn-sm">Host Competition</a>
      </div>
    </div>
  </nav>

  <div class="page-body" style="padding-top: 32px;">
    <div class="container">

      <!-- Loading state -->
      <div id="profile-loading" style="text-align:center; padding: 120px 20px;">
        <div style="font-size:0.85rem; color:var(--text-3);">Loading profile...</div>
      </div>

      <!-- Main Layout (hidden until loaded) -->
      <div class="profile-layout" id="profile-layout" style="display:none;">

        <!-- LEFT: Creator Card -->
        <div>
          <div class="creator-card" id="creator-card"></div>
        </div>

        <!-- RIGHT: Activity -->
        <div>
          <div class="profile-right-header">
            <h2 id="right-title">Competition History</h2>
          </div>

          <div class="tabs" id="profile-tabs">
            <button class="tab-btn" data-tab="entries">Entries</button>
            <button class="tab-btn" data-tab="hosted">Hosted</button>
          </div>

          <!-- Entries Tab -->
          <div class="tab-panel" data-tab="entries">
            <div class="card">
              <div id="entries-list">
                <div class="empty-state" style="padding:40px;">
                  <p>No entries yet</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Hosted Tab -->
          <div class="tab-panel" data-tab="hosted">
            <div class="card">
              <div id="hosted-list">
                <div class="empty-state" style="padding:40px;">
                  <p>No competitions hosted yet</p>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
      <div>
        <div style="font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-0.03em;margin-bottom:4px;">Flixora<span style="color:var(--text-3);">Play</span></div>
        <p style="font-size:0.78rem;color:var(--text-4);">AI Film Festival Platform</p>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:0.82rem;">
        <a href="browse.html">Browse</a>
        <a href="create-competition.html">Host</a>
        <a href="leaderboard.html">Leaderboard</a>
      </div>
    </div>
  </footer>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    const profileId = getParam('id');

    function getTierInfo(tier) {
      const map = {
        bronze:   { icon: 'shield',  label: 'Bronze',   cls: 'tier-bronze' },
        silver:   { icon: 'shield',  label: 'Silver',   cls: 'tier-silver' },
        gold:     { icon: 'award',   label: 'Gold',     cls: 'tier-gold' },
        platinum: { icon: 'gem',     label: 'Platinum', cls: 'tier-platinum' }
      };
      return map[tier] || map.bronze;
    }

    function getRankIcon(rank) {
      if (rank === 1) return { icon: 'medal', cls: 'won', label: '1st Place' };
      if (rank === 2) return { icon: 'award', cls: 'silver', label: '2nd Place' };
      if (rank === 3) return { icon: 'star', cls: 'bronze', label: '3rd Place' };
      return { icon: 'film', cls: '', label: 'Participated' };
    }

    document.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons();

      if (!profileId) {
        const session = getSession();
        if (session && session.id) {
          window.location.href = `profile.html?id=${session.id}`;
          return;
        }
        document.getElementById('profile-loading').innerHTML = `
          <div class="empty-state" style="padding:60px 20px;">
            <h3>No profile selected</h3>
            <p>Sign in to view your profile, or click a creator's name to see theirs.</p>
            <a href="login.html" class="btn btn-primary btn-sm" style="margin-top:12px;">Sign In</a>
          </div>`;
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/users?id=${profileId}`, { headers: API.getHeaders() });
        if (!res.ok) throw new Error('Profile not found');
        const data = await res.json();
        const { user, stats, entries } = data;

        document.title = `${user.username} — FlixoraPlay`;

        const session = getSession();
        const isOwnProfile = session && session.id === user.id;

        // ── Build the Creator Card ──────────────────
        const initial = (user.username || '?')[0].toUpperCase();
        const avatarContent = user.avatar_url
          ? `<img src="${user.avatar_url}" alt="${user.username}" />`
          : initial;

        const tierInfo = getTierInfo(user.tier);

        const winRate = stats.totalEntries > 0
          ? Math.round((stats.wins / stats.totalEntries) * 100)
          : 0;

        const card = document.getElementById('creator-card');
        card.innerHTML = `
          <div class="cc-banner"></div>
          <div class="cc-body">
            <div class="cc-avatar">${avatarContent}</div>
            <div class="cc-name">${user.username}</div>
            <div class="cc-role">${user.role || 'Creator'}</div>

            <div class="cc-badge-row">
              <span class="cc-tier ${tierInfo.cls}">
                <svg data-lucide="${tierInfo.icon}"></svg>
                ${tierInfo.label}
              </span>
              ${user.verified ? '<span class="cc-tier" style="color:var(--green-light);">Verified</span>' : ''}
            </div>

            ${user.bio ? `<div class="cc-bio">${user.bio}</div>` : ''}

            <hr class="cc-divider" />

            <div class="cc-stats">
              <div class="cc-stat">
                <div class="cc-stat-num">${stats.totalEntries}</div>
                <div class="cc-stat-lbl">Entries</div>
              </div>
              <div class="cc-stat">
                <div class="cc-stat-num">${stats.wins}</div>
                <div class="cc-stat-lbl">Wins</div>
              </div>
              <div class="cc-stat">
                <div class="cc-stat-num">${winRate}%</div>
                <div class="cc-stat-lbl">Win Rate</div>
              </div>
            </div>

            <hr class="cc-divider" />

            <div class="cc-meta">
              <div class="cc-meta-row">
                <svg data-lucide="star"></svg>
                <span><strong style="color:#fff;">${stats.points}</strong> global points</span>
              </div>
              <div class="cc-meta-row">
                <svg data-lucide="calendar"></svg>
                <span>Joined ${formatDate(user.createdAt)}</span>
              </div>
              <div class="cc-meta-row">
                <svg data-lucide="clapperboard"></svg>
                <span>${stats.competitionsHosted} competition${stats.competitionsHosted !== 1 ? 's' : ''} hosted</span>
              </div>
            </div>
          </div>

          ${isOwnProfile ? `
          <div class="cc-footer">
            <a href="settings.html" class="btn btn-outline btn-sm">Edit Profile</a>
            <a href="dashboard.html" class="btn btn-primary btn-sm">Dashboard</a>
          </div>` : ''}
        `;

        // ── Right panel title ───────────────────────
        document.getElementById('right-title').textContent =
          isOwnProfile ? 'Your Activity' : `${user.username}'s Activity`;

        // ── Entries list ────────────────────────────
        const entriesList = document.getElementById('entries-list');
        if (entries.length === 0) {
          entriesList.innerHTML = `<div class="empty-state" style="padding:40px;"><p>No competition entries yet.</p></div>`;
        } else {
          entriesList.innerHTML = entries.map(e => {
            const r = getRankIcon(e.rank);
            return `
              <div class="history-item">
                <div class="history-icon ${r.cls}"><svg data-lucide="${r.icon}"></svg></div>
                <div class="history-info">
                  <div class="history-title">${e.title}</div>
                  <div class="history-detail">
                    ${r.label} · <a href="competition.html?id=${e.competitionId}">${e.competitionTitle || 'Competition'}</a> · ${formatDate(e.submittedAt)}
                  </div>
                </div>
                <div class="history-score">
                  ${e.score ? `<div class="num">${e.score}</div><div class="lbl">score</div>` : `<div style="font-size:0.75rem;color:var(--text-4);">—</div>`}
                </div>
              </div>`;
          }).join('');
        }

        // ── Hosted list ─────────────────────────────
        if (stats.competitionsHosted > 0) {
          try {
            const allComps = await API.getCompetitions();
            const hosted = allComps.filter(c => c.hostId === profileId);
            const hostedList = document.getElementById('hosted-list');
            if (hosted.length > 0) {
              hostedList.innerHTML = hosted.map(c => {
                const statusLabel = c.status === 'open' ? 'Open'
                  : c.status === 'judging' ? 'Judging' : 'Closed';
                return `
                  <div class="history-item">
                    <div class="history-icon"><svg data-lucide="clapperboard"></svg></div>
                    <div class="history-info">
                      <div class="history-title"><a href="competition.html?id=${c.id}">${c.title}</a></div>
                      <div class="history-detail">${statusLabel} · ${c.prize || 'No prize'} · Deadline: ${formatDate(c.deadline)}</div>
                    </div>
                  </div>`;
              }).join('');
            }
          } catch (err) {
            console.warn('Could not load hosted competitions:', err);
          }
        }

        // ── Show layout, hide loading ───────────────
        document.getElementById('profile-loading').style.display = 'none';
        document.getElementById('profile-layout').style.display = 'grid';

        lucide.createIcons();
        initTabs();

      } catch (err) {
        document.getElementById('profile-loading').innerHTML = `
          <div class="empty-state" style="padding:60px 20px;">
            <h3>Profile not found</h3>
            <p>${err.message}</p>
            <a href="index.html" class="btn btn-outline btn-sm" style="margin-top:8px;">Back Home</a>
          </div>`;
      }
    });
  </script>
</body>
</html>
