<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-client-id" content="1082029968405-8hb9sk6r3nf8nn09s62k2quju8iecvf3.apps.googleusercontent.com">
  <title>Sign In — FlixoraPlay</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 32px) 16px 48px;
    }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-logo-icon {
      width: 48px; height: 48px;
      border-radius: var(--radius-sm);
      background: var(--bg-3);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      color: var(--text);
    }
    .auth-logo-icon svg { width: 26px; height: 26px; }
  </style>
</head>
<body>

<nav id="main-nav">
    <div class="container nav-inner">
      <a href="/index.html" class="nav-logo">Flixora<span style="color:var(--text-3);">Play</span></a>
      <div class="nav-links">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/pages/browse.html" class="nav-link">Contests</a>
        <a href="/pages/leaderboard.html" class="nav-link">Leaderboard</a>
      </div>
      <div class="nav-actions">
        <a href="/auth/login.html" class="nav-link" style="color:#fff;">Sign In</a>
        <a href="/competitions/create-competition.html" class="btn btn-primary" style="font-weight:600;">Host Competition</a>
      </div>
    </div>
  </nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:28px;">
      <div class="auth-logo-icon">
        <svg data-lucide="film"></svg>
      </div>
      <h1 style="font-size:1.5rem;font-weight:800;color:#fff;letter-spacing:-0.03em;margin-bottom:6px;">Welcome back</h1>
      <p class="text-muted" style="font-size:0.875rem;">Sign in to your FlixoraPlay account.</p>
    </div>

    <div class="card">
      <div class="card-body" style="padding:28px;">
        <button class="btn btn-outline w-full" style="justify-content:center; margin-bottom: 22px; font-weight: 500; display: flex; align-items: center; gap: 8px;" onclick="initGoogleSignIn()">
          <svg viewBox="0 0 24 24" style="width: 18px; height: 18px;">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>

        <!-- Google Sign-In button container -->
        <div id="g_id_onload"
             data-client_id="1082029968405-8hb9sk6r3nf8nn09s62k2quju8iecvf3.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleCallback"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left"
             style="display:none;">
        </div>

        <div class="divider" style="margin:22px 0;">
           <span style="background:var(--bg-3); padding:0 10px; color:var(--text-3); font-size:0.8rem; position:relative; top:-10px;">OR</span>
        </div>

        <div class="form-group">
          <label for="l-email">
            <svg data-lucide="mail" style="width:13px;height:13px;display:inline;vertical-align:middle;margin-right:4px;"></svg>
            Email <span class="req">*</span>
          </label>
          <input type="email" id="l-email" placeholder="you@example.com" />
        </div>
        <div class="form-group" style="margin-bottom:24px;">
          <label for="l-password">
            <svg data-lucide="lock" style="width:13px;height:13px;display:inline;vertical-align:middle;margin-right:4px;"></svg>
            Password <span class="req">*</span>
          </label>
          <input type="password" id="l-password" placeholder="Enter your password" />
        </div>

        <button class="btn btn-primary w-full" onclick="handleLogin()" style="justify-content:center;">
          <svg data-lucide="log-in"></svg> Sign In
        </button>

        <div class="divider" style="margin:22px 0;"></div>

        <p style="text-align:center;font-size:0.875rem;color:var(--text-3);">
          Don't have an account?
          <a href="/auth/register.html" style="color:var(--purple-light);font-weight:600;">Create one free</a>
        </p>
      </div>
    </div>

    <div class="alert alert-info" style="margin-top:16px;">
      <svg data-lucide="info"></svg>
      <div><strong>Note:</strong> In this demo, any password works for an existing email.</div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="/js/app.js"></script>
<script>
  lucide.createIcons();

  function initGoogleSignIn() {
    // Triggers the Google sign-in prompt programmatically
    const client_id = document.querySelector('meta[name="google-client-id"]').content;
    if (client_id && client_id !== 'PLACEHOLDER_GOOGLE_CLIENT_ID') {
        document.querySelector('.g_id_signin div[role="button"]').click();
    } else {
        // Since we don't have a real client id yet, mock the button click for the Google UI prompt
        document.querySelector('.g_id_signin div[role="button"]')?.click();
    }
  }

  async function handleGoogleCallback(response) {
    try {
      const user = await API.loginGoogle(response.credential);
      setSession(user);
      showToast('Welcome, ' + user.user.username, 'success');
      setTimeout(() => navigate('/index.html'), 1000);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  async function handleLogin() {
    const email    = document.getElementById('l-email').value.trim();
    const password = document.getElementById('l-password').value.trim();
    if (!email || !password) { showToast('Please enter email and password.', 'error'); return; }
    if (!email.includes('@')) { showToast('Please enter a valid email.', 'error'); return; }

    try {
      const user = await API.login(email, password);
      setSession(user);
      showToast('Welcome back, ' + user.username, 'success');
      setTimeout(() => navigate('/pages/browse.html'), 1000);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
