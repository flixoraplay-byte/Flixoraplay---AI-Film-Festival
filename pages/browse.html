<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Competitions — FlixoraPlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    /* Filters Toolbar */
    .filter-toolbar {
      background: rgba(255,255,255,0.01);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(10px);
    }
    .filter-row {
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: space-between;
    }
    .search-input {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 10px 16px 10px 40px;
      border-radius: 99px;
      width: 100%;
      font-family: inherit;
    }
    .search-input:focus { border-color: rgba(255,255,255,0.3); outline: none; }
    .search-wrapper-v6 { position: relative; width: 100%; max-width: 320px; }
    .search-wrapper-v6 svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-4); }

    /* Pills Update */
    .category-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-pill {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-3);
      padding: 8px 16px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
    }
    .cat-pill:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .cat-pill.active { background: #fff; color: #000; border-color: #fff; }
    /* Nav overriding */
    nav {
      background: rgba(0,0,0,0.8) !important;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border) !important;
      position: fixed; top:0; left:0; right:0; z-index:1000;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="main-nav">
    <div class="container nav-inner">
      <a href="/index.html" class="nav-logo">Flixora<span style="color:var(--text-3);">Play</span></a>
      <div class="nav-links">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/pages/browse.html" class="nav-link">Contests</a>
        <a href="/pages/leaderboard.html" class="nav-link">Leaderboard</a>
      </div>
      <div class="nav-actions">
        <a href="/auth/login.html" class="nav-link" style="color:#fff;">Sign In</a>
        <a href="/competitions/create-competition.html" class="btn btn-primary" style="font-weight:600;">Host Competition</a>
      </div>
    </div>
  </nav>

  <div class="page-body" style="padding-top: 120px; padding-bottom: 120px;">
    <div class="container">

      <!-- TOOLBAR -->
      <div class="filter-toolbar">
        
        <div class="filter-row">
          <div class="category-pills" id="category-pills">
            <button class="cat-pill active" data-category="all">All Genres</button>
            <button class="cat-pill" data-category="Sci-Fi">Sci-Fi</button>
            <button class="cat-pill" data-category="Horror">Horror</button>
            <button class="cat-pill" data-category="Fantasy">Fantasy</button>
            <button class="cat-pill" data-category="Cyberpunk">Cyberpunk</button>
            <button class="cat-pill" data-category="Drama">Drama</button>
            <button class="cat-pill" data-category="Comedy">Comedy</button>
            <button class="cat-pill" data-category="Animation">Animation</button>
          </div>
        </div>

        <div class="filter-row" style="border-top: 1px solid var(--glass-border); padding-top: 20px;">
          
          <div class="tabs" id="status-tabs" style="margin:0;">
            <button class="tab-btn active" data-tab="all"><svg data-lucide="layout-grid"></svg> All</button>
            <button class="tab-btn" data-tab="open"><svg data-lucide="circle-dot"></svg> Open</button>
            <button class="tab-btn" data-tab="judging"><svg data-lucide="scale"></svg> Judging</button>
            <button class="tab-btn" data-tab="closed"><svg data-lucide="lock"></svg> Closed</button>
          </div>

          <div style="display:flex; gap:12px; align-items:center; flex:1; justify-content:flex-end;">
            <div class="search-wrapper-v6">
              <svg data-lucide="search"></svg>
              <input type="text" id="search-input" class="search-input" placeholder="Search briefs..." />
            </div>
            <select id="sort-select" style="max-width:160px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 14px;">
              <option value="newest">Newest First</option>
              <option value="deadline">Deadline Soon</option>
              <option value="prize">Highest Prize</option>
            </select>
          </div>
          
        </div>
      </div>

      <div style="margin-bottom: 24px; font-size:0.9rem; font-weight:600; color:var(--text-4);">
        <span id="result-count">0 competitions</span>
      </div>

      <!-- COMPETITIONS GRID -->
      <div class="cinematic-grid" id="comp-grid">
        <!-- Loader Skeleton Slices -->
        <div class="cine-card">
          <div class="cine-thumb skeleton skeleton-thumb"></div>
          <div class="cine-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width:90%;"></div>
            <div class="skeleton skeleton-text" style="width:70%;"></div>
          </div>
        </div>
        <div class="cine-card">
          <div class="cine-thumb skeleton skeleton-thumb"></div>
          <div class="cine-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width:90%;"></div>
            <div class="skeleton skeleton-text" style="width:70%;"></div>
          </div>
        </div>
        <div class="cine-card">
          <div class="cine-thumb skeleton skeleton-thumb"></div>
          <div class="cine-body">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width:90%;"></div>
            <div class="skeleton skeleton-text" style="width:70%;"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer" style="border-top:1px solid var(--glass-border);">
    <div class="container">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
        <div>
          <div style="font-weight: 800; font-size:1.2rem; color: #fff; letter-spacing:-0.03em;">Flixora<span style="color:var(--text-3);">Play</span></div>
          <div style="font-size: 0.8rem; color: var(--text-4); margin-top:4px;">© 2026 FlixoraPlay. Professional AI Film Infrastructure.</div>
        </div>
        <div style="display:flex; gap:24px; font-size:0.85rem; font-weight:500;">
          <a href="/pages/browse.html" style="color:var(--text-2);">Contests</a>
          <a href="/competitions/create-competition.html" style="color:var(--text-2);">Host</a>
          <a href="/pages/leaderboard.html" style="color:var(--text-2);">Leaderboard</a>
        </div>
      </div>
    </div>
  
    <div class="container" style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); display:flex; justify-content:center; gap:20px; flex-wrap:wrap; font-size:0.75rem; color:var(--text-4);">
        <a href="/pages/terms.html" style="color:var(--text-4);">Terms & Conditions</a>
        <a href="/pages/privacy.html" style="color:var(--text-4);">Privacy Policy</a>
        <a href="/pages/refunds.html" style="color:var(--text-4);">Cancellation & Refunds</a>
        <a href="/pages/contact.html" style="color:var(--text-4);">Contact Us</a>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let activeCategory = 'all';
    let activeStatus = 'all';
    let searchDebounceTimeout = null;
    let allEntries = [];

    document.addEventListener('DOMContentLoaded', async () => {
      // Load entries globally to calculate entry counts
      try {
        allEntries = await API.getEntries();
      } catch (err) {
        console.warn('Failed to load entries statistics', err);
      }

      // Wire Category Pills
      document.getElementById('category-pills').addEventListener('click', (e) => {
        const pill = e.target.closest('.cat-pill');
        if (!pill) return;
        document.querySelectorAll('.cat-pill').forEach(btn => btn.classList.remove('active'));
        pill.classList.add('active');
        activeCategory = pill.dataset.category;
        loadCompetitions();
      });

      // Wire Status Tabs
      document.getElementById('status-tabs').addEventListener('click', (e) => {
        const tab = e.target.closest('.tab-btn');
        if (!tab) return;
        document.querySelectorAll('#status-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
        tab.classList.add('active');
        activeStatus = tab.dataset.tab;
        loadCompetitions();
      });

      // Wire Search & Sort
      document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(searchDebounceTimeout);
        searchDebounceTimeout = setTimeout(loadCompetitions, 300);
      });
      document.getElementById('sort-select').addEventListener('change', loadCompetitions);

      // Initial Fetch
      loadCompetitions();
    });

    function showSkeletons() {
      const grid = document.getElementById('comp-grid');
      grid.innerHTML = Array(3).fill(0).map(() => `
        <div class="cine-card">
          <div class="cine-thumb skeleton skeleton-thumb"></div>
          <div class="cine-body">
            <div class="skeleton skeleton-title" style="margin-bottom:12px;"></div>
            <div class="skeleton skeleton-text" style="width:90%;"></div>
            <div class="skeleton skeleton-text" style="width:70%;"></div>
          </div>
        </div>
      `).join('');
    }

    async function loadCompetitions() {
      showSkeletons();

      const searchVal = document.getElementById('search-input').value.trim();
      const sortVal = document.getElementById('sort-select').value;

      try {
        let comps = await API.getCompetitions({
          search: searchVal || null,
          category: activeCategory || null,
          sort: sortVal || null,
          // Removed is_brand_brief filter to show everything on browse page
        });

        // Filter status client-side
        if (activeStatus !== 'all') {
          comps = comps.filter(c => c.status === activeStatus);
        }

        renderCompetitions(comps);
      } catch (err) {
        document.getElementById('comp-grid').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="icon"><svg data-lucide="wifi-off"></svg></div>
            <h3>Could not connect</h3>
            <p>${err.message}</p>
            <button class="btn btn-outline" onclick="loadCompetitions()" style="margin-top:16px;"><svg data-lucide="refresh-cw"></svg> Retry</button>
          </div>`;
        lucide.createIcons();
      }
    }

    function renderCompetitions(comps) {
      document.getElementById('result-count').textContent = `${comps.length} Brief${comps.length !== 1 ? 's' : ''}`;
      const grid = document.getElementById('comp-grid');

      if (comps.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1; padding: 80px 20px;">
            <div class="icon"><svg data-lucide="inbox"></svg></div>
            <h3>No matches found</h3>
            <p>We couldn't find any competitions matching your selected filters. Try broadening your query.</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      const placeholders = [
        'https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=800&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=800&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1588345921523-c2dcdb7f1dcd?q=80&w=800&auto=format&fit=crop'
      ];

      grid.innerHTML = comps.map((comp, index) => {
        const days = daysRemaining(comp.deadline);
        const statusBadge = {
          open: `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(46,160,67,0.15);color:var(--green-light);border-radius:4px;font-size:0.7rem;font-weight:700;"><svg data-lucide="circle-dot" style="width:10px;height:10px;"></svg> OPEN</span>`,
          judging: `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(229,165,10,0.15);color:var(--gold-light);border-radius:4px;font-size:0.7rem;font-weight:700;"><svg data-lucide="scale" style="width:10px;height:10px;"></svg> JUDGING</span>`,
          closed: `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:rgba(255,255,255,0.05);color:var(--text-3);border-radius:4px;font-size:0.7rem;font-weight:700;"><svg data-lucide="lock" style="width:10px;height:10px;"></svg> CLOSED</span>`,
        }[comp.status] || '';

        const entriesCount = allEntries.filter(e => e.competitionId === comp.id).length;
        const img = comp.thumbnail || placeholders[index % placeholders.length];

        return `
          <a href="/competitions/competition.html?id=${comp.id}" class="cine-card ${comp.is_brand_brief ? 'premium' : ''}">
            <div class="cine-thumb">
              <img src="${img}" alt="Brief thumbnail" />
              <svg data-lucide="${comp.is_brand_brief ? 'briefcase' : 'film'}" style="position:relative; z-index:1; width:36px;height:36px;color:#fff;opacity:0.8;"></svg>
              ${comp.is_brand_brief ? `<div class="premium-badge"><svg data-lucide="award" style="width:12px;height:12px;"></svg> AdArena Brief</div>` : ''}
              
              <!-- Floating status badge over image -->
              <div style="position:absolute;bottom:16px;left:16px;z-index:2;">
                ${statusBadge}
              </div>
            </div>
            
            <div class="cine-body">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                <h3 class="cine-title">${comp.title}</h3>
              </div>
              <p class="cine-desc">${comp.description || 'No description provided.'}</p>
              
              <div class="cine-meta">
                <span style="display:flex;align-items:center;gap:4px;"><svg data-lucide="clock" style="width:14px;height:14px;"></svg> ${days > 0 ? days + 'd left' : 'Ended'}</span>
                <span style="display:flex;align-items:center;gap:4px;color:var(--gold-light);"><svg data-lucide="trophy" style="width:14px;height:14px;"></svg> ${comp.prize || 'Glory'}</span>
                <span style="display:flex;align-items:center;gap:4px;color:var(--text-3);"><svg data-lucide="users" style="width:14px;height:14px;"></svg> ${entriesCount}</span>
              </div>
            </div>
          </a>`;
      }).join('');

      lucide.createIcons();
    }
  </script>
</body>
</html>
