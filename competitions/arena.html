<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELO Arena — FlixoraPlay</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body { background-color: #050505; color: #fff; }
    .arena-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }
    .arena-header {
      margin-bottom: 40px;
    }
    .arena-header h1 {
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--gold-light), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .arena-header p {
      color: var(--text-3);
      font-size: 1.1rem;
    }
    .matchup-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 30px;
      align-items: center;
    }
    .vs-badge {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text-4);
      background: #111;
      padding: 20px;
      border-radius: 50%;
      border: 2px solid #222;
    }
    .entry-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .entry-card:hover {
      transform: translateY(-5px);
      border-color: var(--gold-light);
    }
    .entry-card .entry-thumb {
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
    }
    .entry-card .entry-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
    }
    .entry-card .entry-body {
      padding: 20px;
      text-align: left;
    }
    .entry-card .entry-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .entry-card .entry-creator {
      color: var(--text-3);
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
    .vote-btn-arena {
      display: block;
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      background: var(--purple-light);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .vote-btn-arena:hover {
      background: var(--purple);
    }
    .elo-display {
      font-size: 0.8rem;
      color: var(--text-4);
      margin-top: 10px;
      text-align: center;
    }
    
    @media (max-width: 900px) {
      .matchup-grid {
        grid-template-columns: 1fr;
      }
      .vs-badge {
        width: max-content;
        margin: 0 auto;
        padding: 10px;
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

  <nav id="main-nav">
    <div class="container nav-inner">
      <a href="/index.html" class="nav-logo">Flixora<span style="color:var(--text-3);">Play</span></a>
      <div class="nav-links">
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/pages/browse.html" class="nav-link">Contests</a>
        <a href="/pages/leaderboard.html" class="nav-link">Leaderboard</a>
      </div>
      <div class="nav-actions">
        <a href="/auth/login.html" class="nav-link" style="color:#fff;">Sign In</a>
        <a href="/competitions/create-competition.html" class="btn btn-primary" style="font-weight:600;">Host Competition</a>
      </div>
    </div>
  </nav>

  <div class="arena-container">
    <div class="arena-header">
      <h1>ELO Arena</h1>
      <p>Watch both entries. Vote for the best one. Your vote impacts their global ELO rating.</p>
    </div>

    <div id="matchup-container">
      <div style="text-align:center; padding: 50px;">
        <svg data-lucide="loader" style="width: 40px; height: 40px; animation: spin 1s linear infinite;"></svg>
        <p style="margin-top:20px; color:var(--text-3);">Finding opponents...</p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    lucide.createIcons();
    const compId = getParam('id');
    if (!compId) {
      window.location.href = '/pages/browse.html.href';
    }
    document.getElementById('back-btn').href = `competition.html?id=${compId}`;

    let currentMatchup = [];

    async function loadMatchup() {
      const container = document.getElementById('matchup-container');
      container.innerHTML = `
        <div style="text-align:center; padding: 50px;">
          <svg data-lucide="loader" style="width: 40px; height: 40px; animation: spin 1s linear infinite;"></svg>
          <p style="margin-top:20px; color:var(--text-3);">Finding opponents...</p>
        </div>`;
      lucide.createIcons();

      try {
        const response = await fetch(`/api/elo-matchup?competitionId=${compId}`);
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Failed to load matchup');
        }
        currentMatchup = await response.json();
        
        if (currentMatchup.length < 2) {
            throw new Error('Not enough entries to create a matchup.');
        }

        renderMatchup();
      } catch (err) {
        container.innerHTML = `
          <div style="text-align:center; padding: 50px;">
            <svg data-lucide="alert-circle" style="width: 40px; height: 40px; color: var(--red);"></svg>
            <p style="margin-top:20px; font-size: 1.2rem;">${err.message}</p>
            <a href="/competitions/competition.html?id=${compId}" class="btn btn-primary" style="margin-top:20px;">Return to Competition</a>
          </div>`;
        lucide.createIcons();
      }
    }

    function renderMatchup() {
      const entryA = currentMatchup[0];
      const entryB = currentMatchup[1];

      const container = document.getElementById('matchup-container');
      container.innerHTML = `
        <div class="matchup-grid">
          <!-- Entry A -->
          <div class="entry-card">
            <div class="entry-thumb" onclick="toggleInlinePlayer('${entryA.id}', '${entryA.videoUrl}')" style="cursor:pointer;">
              <img src="${getVideoThumbnail(entryA.videoUrl)}" alt="${entryA.title}" onerror="this.style.display='none';" />
              <div class="play-overlay"><svg data-lucide="play"></svg></div>
            </div>
            <div class="entry-body">
              <div class="entry-title">${entryA.title}</div>
              <div class="entry-creator">by ${entryA.creatorName}</div>
              <button class="vote-btn-arena" onclick="submitVote('${entryA.id}', '${entryB.id}')">Vote for A</button>
              <div class="elo-display">Current ELO: ${entryA.elo_rating || 1200}</div>
            </div>
          </div>

          <!-- VS Badge -->
          <div class="vs-badge">VS</div>

          <!-- Entry B -->
          <div class="entry-card">
            <div class="entry-thumb" onclick="toggleInlinePlayer('${entryB.id}', '${entryB.videoUrl}')" style="cursor:pointer;">
              <img src="${getVideoThumbnail(entryB.videoUrl)}" alt="${entryB.title}" onerror="this.style.display='none';" />
              <div class="play-overlay"><svg data-lucide="play"></svg></div>
            </div>
            <div class="entry-body">
              <div class="entry-title">${entryB.title}</div>
              <div class="entry-creator">by ${entryB.creatorName}</div>
              <button class="vote-btn-arena" onclick="submitVote('${entryB.id}', '${entryA.id}')">Vote for B</button>
              <div class="elo-display">Current ELO: ${entryB.elo_rating || 1200}</div>
            </div>
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    async function submitVote(winnerId, loserId) {
      try {
        const response = await fetch('/api/elo-vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ winnerId, loserId })
        });
        
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Vote failed');
        }
        
        const result = await response.json();
        showToast(`Vote counted! Winner ELO is now ${result.new_winner_elo}`, 'success');
        
        // Load next matchup
        setTimeout(() => {
          loadMatchup();
        }, 1500);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Initialize
    loadMatchup();

  </script>
</body>
</html>
